    <script type="text/javascript">
      var player;
      var playersPlayingTmp = [];
      var isInitialized = false;
      var isPaused = false;

      function loadTour() {
        if (player) return;

        var beginFunc = function (event) {
          if (event.name == 'begin') {
            var camera = event.data.source.get('camera');
            if (
              camera &&
              camera.get('initialSequence') &&
              camera.get('initialSequence').get('movements').length > 0
            )
              return;
          }

          if (event.sourceClassName == 'MediaAudio') return;

          isInitialized = true;

          player.unbind('preloadMediaShow', beginFunc, player, true);
          player.unbindOnObjectsOf('PanoramaPlayListItem', 'begin', beginFunc, player, true);
          player.unbind('stateChange', beginFunc, player, true);
          window.parent.postMessage('tourLoaded', '*');

          disposePreloader();

          onVirtualTourLoaded();
        };

        var settings = new TDV.PlayerSettings();

        settings.set(TDV.PlayerSettings.CONTAINER, document.getElementById('viewer'));
        settings.set(TDV.PlayerSettings.SCRIPT_URL, 'script.js');
        settings.set(TDV.PlayerSettings.WEBVR_POLYFILL_URL, 'lib/WebVRPolyfill.js?v=1718020288664');
        settings.set(TDV.PlayerSettings.HLS_URL, 'lib/Hls.js?v=1718020288664');
        settings.set(TDV.PlayerSettings.QUERY_STRING_PARAMETERS, 'v=1718020288664');
        window.tdvplayer = player = TDV.PlayerAPI.create(settings);
        player.bind('preloadMediaShow', beginFunc, player, true);
        player.bind('stateChange', beginFunc, player, true);
        player.bindOnObjectsOf('PanoramaPlayListItem', 'begin', beginFunc, player, true);
        player.bindOnObject(
          'rootPlayer',
          'start',
          function (e) {
            var queryDict = {};
            location.search
              .substr(1)
              .split('&')
              .forEach(function (item) {
                var k = item.split('=')[0],
                  v = decodeURIComponent(item.split('=')[1]);
                queryDict[k] = v;
              });
            var item = undefined;
            if ('media-index' in queryDict) {
              item = setMediaByIndex(parseInt(queryDict['media-index']) - 1);
            } else if ('media-name' in queryDict) {
              item = setMediaByName(queryDict['media-name']);
            } else {
              item = setMediaByIndex(0);
            }
            if (item != undefined && 'trigger-overlay-name' in queryDict) {
              triggerOverlayByName(
                item,
                queryDict['trigger-overlay-name'],
                'trigger-overlay-event' in queryDict ? queryDict['trigger-overlay-event'] : 'click'
              );
            }

            player.getById('rootPlayer').bind(
              'tourEnded',
              function () {
                onVirtualTourEnded();
              },
              player,
              true
            );
          },
          player,
          false
        );

        /* Listen messages */
        window.addEventListener('message', function (e) {
          //Listen to messages for make actions to player in the format function:param1,param2
          var action = e.data;
          if (action == 'pauseTour' || action == 'resumeTour') {
            this[action].apply(this);
          }
        });
      }

      function pauseTour() {
        isPaused = true;
        if (!isInitialized) return;

        var playLists = player.getByClassName('PlayList');
        for (var i = 0, count = playLists.length; i < count; i++) {
          var playList = playLists[i];
          var index = playList.get('selectedIndex');
          if (index != -1) {
            var item = playList.get('items')[index];
            var itemPlayer = item.get('player');
            if (itemPlayer && itemPlayer.pause) {
              playersPlayingTmp.push(itemPlayer);
              itemPlayer.pause();
            }
          }
        }

        player.getById('pauseGlobalAudios')();
      }

      function resumeTour() {
        isPaused = false;
        if (!isInitialized) return;

        while (playersPlayingTmp.length) {
          var viewer = playersPlayingTmp.pop();
          viewer.play();
        }

        player.getById('resumeGlobalAudios')();
      }

      function onVirtualTourLoaded() {
        if (isPaused) pauseTour();
      }

      function onVirtualTourEnded() {}

      function getRootPlayer() {
        return window.tdvplayer !== undefined ? window.tdvplayer.getById('rootPlayer') : undefined;
      }

      function setMediaByIndex(index) {
        var rootPlayer = getRootPlayer();
        if (rootPlayer !== undefined) {
          return rootPlayer.setMainMediaByIndex(index);
        }
      }

      function setMediaByName(name) {
        var rootPlayer = getRootPlayer();
        if (rootPlayer !== undefined) {
          return rootPlayer.setMainMediaByName(name);
        }
      }

      function triggerOverlayByName(item, name, eventName) {
        var rootPlayer = getRootPlayer();
        if (rootPlayer !== undefined) {
          item.bind(
            'begin',
            function (e) {
              item.unbind('begin', arguments.callee, this);
              var overlay = rootPlayer.getPanoramaOverlayByName(item.get('media'), name);
              if (overlay) rootPlayer.triggerOverlay(overlay, eventName);
            },
            rootPlayer
          );
        }
      }

      function showPreloader() {
        var preloadContainer = document.getElementById('preloadContainer');
        if (preloadContainer != undefined) preloadContainer.style.opacity = 1;
      }

      function disposePreloader() {
        var preloadContainer = document.getElementById('preloadContainer');
        if (preloadContainer == undefined) return;

        var transitionEndName = transitionEndEventName();
        if (transitionEndName) {
          preloadContainer.addEventListener(transitionEndName, hide, false);
          preloadContainer.style.opacity = 0;
          setTimeout(hide, 500); //Force hide. Some cases the transitionend event isn't dispatched with an iFrame.
        } else {
          hide();
        }

        function hide() {
          preloadContainer.style.visibility = 'hidden';
          preloadContainer.style.display = 'none';
        }

        function transitionEndEventName() {
          var el = document.createElement('div');
          var transitions = {
            transition: 'transitionend',
            OTransition: 'otransitionend',
            MozTransition: 'transitionend',
            WebkitTransition: 'webkitTransitionEnd',
          };

          var t;
          for (t in transitions) {
            if (el.style[t] !== undefined) {
              return transitions[t];
            }
          }

          return undefined;
        }
      }

      function onBodyClick() {
        document.body.removeEventListener('click', onBodyClick);
        document.body.removeEventListener('touchend', onBodyClick);
        loadTour();
      }

      function onLoad() {
        if (/AppleWebKit/.test(navigator.userAgent) && /Mobile\/\w+/.test(navigator.userAgent)) {
          var inIFrame = false;
          try {
            inIFrame = window.self !== window.top;
          } catch (e) {
            inIFrame = true;
          }
          if (!inIFrame) {
            var onResize = function (async) {
              [0, 250, 1000, 2000].forEach(function (delay) {
                setTimeout(function () {
                  var viewer = document.querySelector('#viewer');
                  var scale = window.innerWidth / document.documentElement.clientWidth;
                  var width = document.documentElement.clientWidth;
                  var height = Math.round(window.innerHeight / scale);
                  viewer.style.width = width + 'px';
                  viewer.style.height = height + 'px';
                  viewer.style.left = Math.round((window.innerWidth - width) * 0.5) + 'px';
                  viewer.style.top = Math.round((window.innerHeight - height) * 0.5) + 'px';
                  viewer.style.transform = 'scale(' + scale + ', ' + scale + ')';
                  window.scrollTo(0, 0);
                }, delay);
              });
            };
            window.addEventListener('resize', onResize);
            onResize();
          }
        }

        if (isOVRWeb()) {
          showPreloader();
          loadTour();
          return;
        }

        showPreloader();
        loadTour();
      }

      function playVideo(video) {
        function isSafariDesktopV11orGreater() {
          return (
            /^((?!chrome|android|crios|ipad|iphone).)*safari/i.test(navigator.userAgent) &&
            parseFloat(/Version\/([0-9]+\.[0-9]+)/i.exec(navigator.userAgent)[1]) >= 11
          );
        }

        function detectUserAction() {
          var onVideoClick = function (e) {
            if (video.paused) {
              video.play();
            }
            video.muted = false;
            e.stopPropagation();
            e.stopImmediatePropagation();
            e.preventDefault();
            video.removeEventListener('click', onVideoClick);
            video.removeEventListener('touchend', onVideoClick);
          };
          video.addEventListener('click', onVideoClick);
          video.addEventListener('touchend', onVideoClick);
        }

        if (isSafariDesktopV11orGreater()) {
          video.muted = true;
          video.play();
        } else {
          var canPlay = true;
          var promise = video.play();
          if (promise) {
            promise.catch(function () {
              video.muted = true;
              video.play();
              detectUserAction();
            });
          } else {
            canPlay = false;
          }

          if (!canPlay || video.muted) {
            detectUserAction();
          }
        }
      }

      function isOVRWeb() {
        return window.location.hash.substring(1).split('&').indexOf('ovrweb') > -1;
      }
    </script>
    <style type="text/css">
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)

      }

      #viewer {
        background-color: #000000;
        z-index: 1;
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
      }
      #preloadContainer {
        z-index: 2;
        position: relative;
        width: 100%;
        height: 100%;
        transition: opacity 0.5s;
        -webkit-transition: opacity 0.5s;
        -moz-transition: opacity 0.5s;
        -o-transition: opacity 0.5s;
      }

      /* Hide the specific TDV UI container classes that hold the sidebar & blue header/footer menus */
      /* The white box on the left is probably a list panel or thumbnail menu. */
      /* The blue strip usually sits at the top or bottom as a nav bar container. */

      /* Hide any div that contains specific TDV UI layers */
      div[style*="background-color: rgb(255, 255, 255)"], 
    div[style*="background-color: rgba(255, 255, 255"],
    div[style*="background-color: #FFFFFF"],
    div[style*="background-color: rgb(0, 153, 255)"],
    div[style*="background-color: rgba(0, 153, 255"],
    div[style*="background-color: #0099FF"],
    div[style*="background-color: rgb(54, 169, 225)"], /* Common 3Dvista soft blue */
    div[style*="background: rgb(54, 169, 225)"],
    div[style*="background-color: rgb(24, 114, 255)"],
    div[style*="box-shadow"], 
    div[style*="border-radius"] {
        display: none !important;
        pointer-events: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
      }

      /* Exclude the main viewer canvas itself */
      #viewer,
      #viewer div,
      #viewer > div,
      canvas {
        display: block !important;
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
      }

      /* Hide Loading Bar */
      .tdv-loading-bar,
      .tdv-progress-bar,
      #viewer > div > div[style*='height: 4px;'],
      #viewer > div > div[style*='height: 5px;'],
      #viewer > div > div[style*='height: 3px;'],
      #viewer > div > div[style*='bottom: 0px'] {
        display: none !important;
        opacity: 0 !important;
        width: 0 !important;
        visibility: hidden !important;
      }
    </style>
    <link rel="stylesheet" href="fonts.css" />

    <style id="hide-bloat">
      /* Search for and hide links that go to social media */
      a[href*='facebook.com'],
      a[href*='instagram.com'],
      a[href*='youtube.com'] {
        display: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
        width: 0 !important;
        height: 0 !important;
      }

      /* Aggressively target the standard icons */
      div[style*='facebook'],
      div[style*='instagram'],
      div[style*='youtube'] {
        display: none !important;
      }
    </style>

  <body onload="onLoad()">
    <div
      id="preloadContainer"
      style="background-color: rgba(255, 255, 255, 1); display: none !important"
    ></div>
    <div id="viewer"></div>

    <script>
      window.changePanorama = function (id) {
        if (typeof setMediaByName === 'function') {
          setMediaByName(id);
        } else {
          console.error('setMediaByName not found on window');
        }
      };
    </script>

    <script>
      window.addEventListener('message', function (event) {
        if (event.data && event.data.type === 'changePanorama') {
          if (typeof setMediaByName === 'function') {
            setMediaByName(event.data.id);
          }
        }
      });
    </script>

    <script>
      // Safer UI removal that doesn't break the 360 images/canvas
      setInterval(() => {
        const viewer = document.getElementById('viewer');
        if (!viewer) return;

        // 3DVista creates direct children for UI components.
        // The panorama itself is usually z-index 1 or lowest, UI is higher.
        const children = Array.from(viewer.children);
        children.forEach((child) => {
          // If child contains the main canvas or is obviously the scene container, leave it alone
          if (child.querySelector('canvas') || child.tagName === 'CANVAS') {
            return;
          }

          // In Safari/fallback mode, it uses lots of <img> tags. Let's not hide the main container if it has big images.
          if (child.querySelector('img') && child.offsetWidth > window.innerWidth * 0.5) {
            return;
          }

          // Force hide the specific bottom blue bar by position or background color
          if (
            child.style.bottom === '0px' ||
            child.style.backgroundColor === 'rgb(54, 169, 225)' ||
            child.innerHTML.includes('rgb(54, 169, 225)')
          ) {
            child.style.setProperty('display', 'none', 'important');
          }

          // Hide anything that looks like a progress bar (thin height)
          if (child.offsetHeight > 0 && child.offsetHeight <= 10) {
            child.style.setProperty('display', 'none', 'important');
          }

          // Hide anything with a high z-index that looks like a UI overlay panel
          const zIndex = parseInt(window.getComputedStyle(child).zIndex);
          if (zIndex >= 2) {
            child.style.setProperty('display', 'none', 'important');
          }
        });
      }, 250);
    </script>
